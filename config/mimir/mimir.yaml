target: all

server:
  http_listen_port: 9009

ingester:
  ring:
    replication_factor: 1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks

compactor:
  data_dir: /data/compactor

# ── THÊM 2 PHẦN NÀY ──────────────────────────────────────────
ruler:
  enable_api: true

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/ruler
